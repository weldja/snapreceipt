<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>SnapReceipt — Scan receipts instantly</title>
<meta name="description" content="The fastest way to log receipts. Scan, confirm, done."/>
<meta name="theme-color" content="#ffffff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="SnapReceipt"/>
<link rel="canonical" href="https://snapreceipt.co.uk/"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#fff;color:#111;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
img{display:block;max-width:100%}

:root{
  --black:#111;--gray-7:#555;--gray-5:#888;--gray-3:#ccc;
  --gray-1:#f5f5f5;--gray-0:#fafafa;
  --blue:#0066ff;--blue-lt:#e8f0ff;--blue-mid:#c5d8ff;
  --green:#00a651;--green-lt:#e6f5ed;
  --red:#e53935;--red-lt:#fdecea;
  --border:#e5e5e5;--r:10px;--r-lg:16px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
  --shadow-md:0 4px 20px rgba(0,0,0,.1);
}

/* ── SCREENS ─────────────────────────────────────── */
.screen{display:none}
.screen.active{display:flex;flex-direction:column}
#authScreen{min-height:100dvh;min-height:100vh}
#homeScreen{min-height:100dvh;min-height:100vh;background:var(--gray-0)}
#scanScreen{height:100dvh;height:100vh;overflow:hidden;background:#fff}

/* ── AUTH ────────────────────────────────────────── */
.auth-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px 48px;max-width:420px;margin:0 auto;width:100%}
.auth-brand{text-align:center;margin-bottom:40px}
.auth-brand-icon{width:72px;height:72px;background:var(--black);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 14px}
.auth-brand-name{font-size:1.7rem;font-weight:800;color:var(--black);letter-spacing:-.04em}
.auth-brand-tag{font-size:.88rem;color:var(--gray-5);margin-top:6px}
.auth-tabs{display:flex;background:var(--gray-1);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:24px;width:100%}
.auth-tab{flex:1;padding:9px;border:none;background:none;border-radius:8px;font-size:.88rem;font-weight:500;color:var(--gray-5);transition:all .15s}
.auth-tab.active{background:#fff;color:var(--black);font-weight:700;box-shadow:var(--shadow)}
.auth-form{width:100%;display:flex;flex-direction:column;gap:12px}
.fl{display:block;font-size:.72rem;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.ti{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:#fff;color:var(--black);font-size:1rem;outline:none;transition:border-color .15s;-webkit-appearance:none}
.ti:focus{border-color:var(--blue)}
.btn-p{width:100%;padding:14px;background:var(--black);color:#fff;border:none;border-radius:var(--r);font-size:1rem;font-weight:700;letter-spacing:-.01em;transition:opacity .15s,transform .1s}
.btn-p:active{transform:scale(.98);opacity:.9}
.btn-p:disabled{opacity:.4;cursor:not-allowed}
.amsg{font-size:.85rem;padding:10px 12px;border-radius:var(--r);display:none;line-height:1.4}
.amsg.ok{display:block;background:var(--green-lt);color:var(--green)}
.amsg.err{display:block;background:var(--red-lt);color:var(--red)}
.alink-row{text-align:center;margin-top:6px}
.alink{background:none;border:none;color:var(--blue);font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:underline;padding:0}

/* ── HOME ────────────────────────────────────────── */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-shrink:0}
.hdr-brand{font-size:1.05rem;font-weight:800;color:var(--black);letter-spacing:-.03em;display:flex;align-items:center;gap:8px}
.hdr-dot{width:8px;height:8px;background:var(--blue);border-radius:50%;flex-shrink:0}
.hdr-btn{height:36px;padding:0 14px;border:1.5px solid var(--border);background:#fff;border-radius:20px;font-size:.82rem;font-weight:600;color:var(--gray-7);display:flex;align-items:center;gap:6px;transition:all .15s}
.hdr-btn:hover{border-color:var(--gray-3);background:var(--gray-0)}

.stats-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.stats-bar::-webkit-scrollbar{display:none}
.stat-item{padding:10px 16px 10px 0;flex-shrink:0;border-right:1px solid var(--border);margin-right:16px}
.stat-item:last-child{border-right:none}
.stat-val{font-size:1.1rem;font-weight:800;color:var(--black);letter-spacing:-.02em;line-height:1}
.stat-val.blue{color:var(--blue)}
.stat-key{font-size:.66rem;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}

.search-wrap{padding:10px 12px 0}
.search-inner{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-5);font-size:.9rem;pointer-events:none}
.search-input{width:100%;padding:10px 12px 10px 34px;border:1.5px solid var(--border);border-radius:var(--r);background:#fff;font-size:.92rem;outline:none;-webkit-appearance:none;transition:border-color .15s}
.search-input:focus{border-color:var(--blue)}

.month-hdr{padding:16px 12px 6px;display:flex;align-items:baseline;justify-content:space-between}
.month-lbl{font-size:.72rem;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.08em}
.month-tot{font-size:1.2rem;font-weight:800;color:var(--black);letter-spacing:-.03em}

.rlist{flex:1;padding:0 12px 120px;display:flex;flex-direction:column;gap:6px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 140px;text-align:center;gap:10px}
.empty-icon{font-size:3rem;opacity:.25}
.empty-title{font-size:1.1rem;font-weight:700}
.empty-sub{font-size:.88rem;color:var(--gray-5);line-height:1.6;max-width:240px}

.rrow{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;animation:fadeUp .2s ease both;box-shadow:var(--shadow)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.rrow:active{opacity:.85}
.rrow.expanded{border-color:var(--black);box-shadow:var(--shadow-md)}
.rrow-main{display:flex;align-items:center;gap:12px;padding:13px 14px}
.rthumb{width:44px;height:56px;border-radius:8px;background:var(--gray-1);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--gray-3);border:1px solid var(--border)}
.rthumb img{width:100%;height:100%;object-fit:cover}
.rinfo{flex:1;min-width:0}
.rmerchant{font-size:1rem;font-weight:700;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}
.rdate{font-size:.74rem;color:var(--gray-5);margin-top:3px;font-weight:500}
.rcat{display:inline-block;margin-top:4px;padding:2px 7px;border-radius:20px;background:var(--gray-1);font-size:.67rem;font-weight:700;color:var(--gray-7);border:1px solid var(--border)}
.ramount{font-size:1.1rem;font-weight:800;color:var(--black);letter-spacing:-.02em;flex-shrink:0;text-align:right}
.rcurrency{font-size:.68rem;color:var(--gray-5);text-align:right;margin-top:2px;font-weight:600;text-transform:uppercase}

.rdetail{display:none;border-top:1px solid var(--border);padding:14px;background:var(--gray-0);flex-direction:column;gap:12px}
.rrow.expanded .rdetail{display:flex}
.rdetail-img{width:100%;max-height:200px;object-fit:contain;border-radius:var(--r);border:1px solid var(--border);background:#fff}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dcell-lbl{font-size:.66rem;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.dcell-val{font-size:.9rem;font-weight:600;color:var(--black)}
.dactions{display:flex;gap:8px}
.btn-out{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:#fff;font-size:.85rem;font-weight:600;color:var(--gray-7);transition:all .15s;cursor:pointer}
.btn-out.danger{color:var(--red);border-color:var(--red)}
.btn-out.danger:hover{background:var(--red-lt)}

.scan-fab{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%);z-index:100;background:var(--black);color:#fff;border:none;border-radius:100px;padding:16px 36px;font-size:1rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:9px;box-shadow:0 4px 24px rgba(0,0,0,.22);white-space:nowrap;transition:transform .15s,box-shadow .15s}
.scan-fab:active{transform:translateX(-50%) scale(.96);box-shadow:0 2px 12px rgba(0,0,0,.18)}

/* ── SCAN ────────────────────────────────────────── */
.scan-hdr{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;background:#fff}
.scan-back{height:36px;padding:0 14px;border:1.5px solid var(--border);background:#fff;border-radius:20px;font-size:.85rem;font-weight:600;color:var(--gray-7);display:flex;align-items:center;gap:5px;transition:all .15s}
.scan-title{font-size:.95rem;font-weight:700;color:var(--black)}
.scan-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:12px;touch-action:pan-y}

/* Upload areas — weldswine proven pattern */
.upload-area{position:relative;border:2px dashed var(--border);border-radius:var(--r-lg);background:var(--gray-0);overflow:hidden;cursor:pointer;transition:all .2s;flex:1}
.upload-area:hover{border-color:var(--blue);background:var(--blue-lt)}
.upload-area input[type="file"]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;z-index:2}
.upload-inner{display:flex;flex-direction:column;align-items:center;gap:6px;padding:22px 12px;pointer-events:none}

/* After photo taken */
.captured-strip{display:none;align-items:center;gap:12px;padding:10px 12px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg)}
.captured-strip.show{display:flex}
.cap-thumb{width:48px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);flex-shrink:0}
.cap-info{flex:1;min-width:0}
.cap-title{font-size:.88rem;font-weight:700;color:var(--black)}
.cap-sub{font-size:.74rem;color:var(--gray-5);margin-top:2px}
.cap-retake{flex-shrink:0;padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-size:.78rem;font-weight:600;color:var(--gray-7);cursor:pointer}

.ocr-bar{display:none;align-items:center;gap:10px;padding:10px 14px;background:var(--blue-lt);border-radius:var(--r);border:1px solid var(--blue-mid)}
.ocr-bar.on{display:flex}
.ocr-spin{width:16px;height:16px;border:2px solid var(--blue-mid);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-text{font-size:.85rem;font-weight:600;color:var(--blue)}

.cfields{display:none;flex-direction:column;gap:12px}
.cfields.on{display:flex}
.cbadge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.74rem;font-weight:700;width:fit-content}
.cbadge.high{background:var(--green-lt);color:var(--green)}
.cbadge.medium{background:#fff8e1;color:#b45309;border:1px solid #fde68a}
.cbadge.low{background:var(--red-lt);color:var(--red)}
.fg{display:flex;flex-direction:column;gap:4px}
.field-lbl{font-size:.72rem;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.07em}
.fi{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:var(--r);background:#fff;color:var(--black);font-size:.97rem;outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus{border-color:var(--blue)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.amtwrap{position:relative}
.amtpfx{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-weight:700;color:var(--gray-5);font-size:.95rem;pointer-events:none}
.fi.pl{padding-left:24px}

.save-bar{flex-shrink:0;padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom,10px));background:#fff;border-top:1px solid var(--border);gap:10px;align-items:center;display:none}
.save-bar.on{display:flex}
.btn-save{flex:1;padding:14px;background:var(--black);color:#fff;border:none;border-radius:var(--r);font-size:1rem;font-weight:700;letter-spacing:-.01em;transition:opacity .15s,transform .1s}
.btn-save:active{transform:scale(.98);opacity:.9}
.btn-save:disabled{opacity:.4}
.btn-cancel{flex-shrink:0;padding:14px 18px;background:var(--gray-1);color:var(--gray-7);border:none;border-radius:var(--r);font-size:.9rem;font-weight:600}

/* ── SUCCESS ─────────────────────────────────────── */
.success-ov{position:fixed;inset:0;z-index:500;background:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px}
.success-ov.on{display:flex;animation:succ .22s ease}
@keyframes succ{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.succ-icon{font-size:4rem;animation:pop .3s cubic-bezier(.34,1.56,.64,1) both .05s}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.succ-amt{font-size:2.4rem;font-weight:800;color:var(--black);letter-spacing:-.04em}
.succ-merchant{font-size:1rem;font-weight:600;color:var(--gray-5)}
.succ-sub{font-size:.85rem;color:var(--gray-5);line-height:1.5}

/* ── SHEETS ──────────────────────────────────────── */
.sheet-bg{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.45);display:none;align-items:flex-end}
.sheet-bg.on{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;padding-bottom:max(20px,env(safe-area-inset-bottom,20px));max-height:92vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--gray-3);border-radius:2px;margin:12px auto 16px}
.sheet-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:.95rem;font-weight:600;color:var(--black);border:none;background:none;width:100%;text-align:left;cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent}
.sheet-item:hover{background:var(--gray-0)}
.sicon{font-size:1.1rem;width:22px;text-align:center}
.sheet-item.muted{color:var(--gray-5);font-size:.85rem}
.sheet-item.danger{color:var(--red)}
.sdiv{height:1px;background:var(--border);margin:4px 0}
.sbody{padding:0 20px 8px}
.sbody h3{font-size:1.05rem;font-weight:700;margin-bottom:14px;color:var(--black)}
.sform{display:flex;flex-direction:column;gap:12px}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sbtns{display:flex;gap:10px;padding-top:4px}

/* ── TOAST ───────────────────────────────────────── */
.toast{position:fixed;bottom:max(90px,calc(env(safe-area-inset-bottom,0px)+90px));left:50%;transform:translateX(-50%) translateY(10px);background:var(--black);color:#fff;padding:9px 18px;border-radius:50px;font-size:.85rem;font-weight:600;white-space:nowrap;z-index:9999;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SKELETON ────────────────────────────────────── */
.skel{background:linear-gradient(90deg,var(--gray-1) 25%,#ececec 50%,var(--gray-1) 75%);background-size:200% 100%;animation:shim 1.3s infinite;border-radius:6px}
@keyframes shim{to{background-position:-200% 0}}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ═══ AUTH ═════════════════════════════════════════════ -->
<div id="authScreen" class="screen">
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="auth-brand-icon">🧾</div>
      <div class="auth-brand-name">SnapReceipt</div>
      <div class="auth-brand-tag">The fastest way to log expenses</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignin" onclick="authTab('signin')">Sign in</button>
      <button class="auth-tab" id="tabSignup" onclick="authTab('signup')">Create account</button>
      <button class="auth-tab" id="tabReset"  onclick="authTab('reset')">Reset</button>
    </div>
    <div id="formSignin" class="auth-form">
      <div><label class="fl">Email</label><input class="ti" id="siEmail" type="email" placeholder="you@example.com" autocomplete="email"/></div>
      <div><label class="fl">Password</label><input class="ti" id="siPass" type="password" placeholder="Your password" autocomplete="current-password"/></div>
      <button class="btn-p" id="btnSignin" onclick="doSignin()">Sign in →</button>
      <div class="amsg" id="siMsg"></div>
      <div class="alink-row"><button class="alink" onclick="authTab('reset')">Forgot password?</button></div>
    </div>
    <div id="formSignup" class="auth-form hidden">
      <div><label class="fl">Email</label><input class="ti" id="suEmail" type="email" placeholder="you@example.com" autocomplete="email"/></div>
      <div><label class="fl">Password</label><input class="ti" id="suPass" type="password" placeholder="Min. 6 characters" autocomplete="new-password"/></div>
      <button class="btn-p" id="btnSignup" onclick="doSignup()">Create account →</button>
      <div class="amsg" id="suMsg"></div>
    </div>
    <div id="formReset" class="auth-form hidden">
      <p style="font-size:.88rem;color:var(--gray-5);line-height:1.5;margin-bottom:4px">We'll send a reset link to your email.</p>
      <div><label class="fl">Email</label><input class="ti" id="rstEmail" type="email" placeholder="you@example.com" autocomplete="email"/></div>
      <button class="btn-p" id="btnReset" onclick="doReset()">Send reset link →</button>
      <div class="amsg" id="rstMsg"></div>
      <div class="alink-row"><button class="alink" onclick="authTab('signin')">← Back to sign in</button></div>
    </div>
  </div>
</div>

<!-- ═══ HOME ══════════════════════════════════════════════ -->
<div id="homeScreen" class="screen">
  <header class="hdr">
    <div class="hdr-brand"><div class="hdr-dot"></div>SnapReceipt</div>
    <div style="display:flex;gap:8px">
      <button class="hdr-btn" onclick="exportCSV()">⬇ Export</button>
      <button class="hdr-btn" onclick="openMenu()">⋯</button>
    </div>
  </header>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val" id="statCount">0</div><div class="stat-key">Receipts</div></div>
    <div class="stat-item"><div class="stat-val blue" id="statMonth">£0.00</div><div class="stat-key">This month</div></div>
    <div class="stat-item"><div class="stat-val" id="statYear">£0.00</div><div class="stat-key">Tax year</div></div>
    <div class="stat-item"><div class="stat-val" id="statVAT">£0.00</div><div class="stat-key">VAT logged</div></div>
  </div>
  <div class="search-wrap">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="search" placeholder="Search receipts…" oninput="filterReceipts(this.value)"/>
    </div>
  </div>
  <div id="rlist" class="rlist"></div>
  <button class="scan-fab" onclick="openScan()">📸 Scan Receipt</button>
</div>

<!-- ═══ SCAN ═══════════════════════════════════════════════ -->
<div id="scanScreen" class="screen">
  <header class="scan-hdr">
    <button class="scan-back" onclick="goHome()">← Back</button>
    <span class="scan-title">Scan Receipt</span>
    <div style="width:72px"></div>
  </header>
  <div class="scan-body" id="scanBody">

    <!-- Upload buttons — file inputs sit inside divs at inset:0, inner has pointer-events:none -->
    <div id="uploadZone" style="display:flex;gap:10px">
      <div class="upload-area" id="cameraArea">
        <input type="file" id="captureInput" accept="image/*" capture="environment"/>
        <div class="upload-inner" style="pointer-events:none">
          <div style="font-size:1.8rem">📷</div>
          <div style="font-size:.88rem;font-weight:700;color:#111;margin-top:2px">Camera</div>
        </div>
      </div>
      <div class="upload-area" id="galleryArea">
        <input type="file" id="galleryInput" accept="image/*"/>
        <div class="upload-inner" style="pointer-events:none">
          <div style="font-size:1.8rem">🖼</div>
          <div style="font-size:.88rem;font-weight:700;color:#111;margin-top:2px">Gallery</div>
        </div>
      </div>
    </div>

    <!-- After photo selected -->
    <div class="captured-strip" id="capturedStrip">
      <img class="cap-thumb" id="capThumb" alt=""/>
      <div class="cap-info">
        <div class="cap-title">Receipt captured ✓</div>
        <div class="cap-sub" id="capSub">AI is reading it…</div>
      </div>
      <button class="cap-retake" onclick="retake()">↩ Retake</button>
    </div>

    <!-- OCR progress -->
    <div class="ocr-bar" id="ocrBar">
      <div class="ocr-spin"></div>
      <div class="ocr-text">Reading receipt…</div>

<script>
'use strict';

/* ── CONFIG ──────────────────────────────────────────── */
const SUPABASE_URL = 'https://swkaswlzzqzjiuujyupg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3a2Fzd2x6enF6aml1dWp5dXBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjQwNDUsImV4cCI6MjA5MDE0MDA0NX0.DpM1H4LXGl9gdci9Qrzjam2yqScZy10M1VLE1-0XnO8';

/* ── STATE ───────────────────────────────────────────── */
var _user     = null;

/* ── HELPERS ─────────────────────────────────────────── */
function g(id) { return document.getElementById(id); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(n, currency) {
  var sym = {GBP:'£',USD:'$',EUR:'€'}[currency] || '£';
  return sym + parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
  catch(e) { return d; }
}
function isoDate(s) {
  if (!s) return today();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  var uk = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (uk) { var y=uk[3],m=uk[2],d=uk[1]; return (y.length===2?'20'+y:y)+'-'+m.padStart(2,'0')+'-'+d.padStart(2,'0'); }
  try { return new Date(s).toISOString().slice(0,10); } catch(e) { return today(); }
}
function setMsg(el, type, text) { el.className='amsg '+type; el.textContent=text; }
function friendlyErr(e) {
  var m = e.message||'';
  if (m.includes('already registered')||m.includes('already exists')) return 'That email is already registered.';
  if (m.includes('Invalid login')||m.includes('invalid_credentials'))  return 'Email or password is incorrect.';
  if (m.includes('Password should')) return 'Password must be at least 6 characters.';
  if (m.includes('Email not confirmed')) return 'Please confirm your email first.';
  return m || 'Something went wrong.';
}
var _toastTimer;
function toast(msg) {
  var t = g('toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.classList.remove('on'); }, 2600);
}
function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  g(id).classList.add('active');
}

/* ── FILE INPUT LISTENERS ────────────────────────────
   Called once at DOMContentLoaded.
   Pattern copied exactly from weldswine which works on
   iOS Safari, Android Chrome, Android Samsung Browser.
   Key rules:
   - input sits at inset:0 inside a relative div
   - inner content has pointer-events:none
   - listen to BOTH change AND input events
   - reset input.value on area click (iOS retake fix)
   - set _cameraOpen flag to block popstate navigation
─────────────────────────────────────────────────────── */
function initFileInputs() {
  var capIn   = g('captureInput');
  var galIn   = g('galleryInput');
  var capArea = g('cameraArea');
  var galArea = g('galleryArea');

  // Reset value immediately before the file picker opens.
  // Use mousedown/touchstart so it fires before the input's click,
  // and does NOT fire again when the camera app returns.
  function prepareInput(input) {
    try { input.value = ''; } catch(e){}
  }

  capArea.addEventListener('mousedown',  function(){ prepareInput(capIn); });
  capArea.addEventListener('touchstart', function(){ prepareInput(capIn); }, {passive:true});
  galArea.addEventListener('mousedown',  function(){ prepareInput(galIn); });
  galArea.addEventListener('touchstart', function(){ prepareInput(galIn); }, {passive:true});

  // Set _cameraOpen on the input's own click — this fires exactly once
  // when the user taps, not when the camera app returns
  capIn.addEventListener('click', function(){ _cameraOpen = true; });
  galIn.addEventListener('click', function(){ _cameraOpen = true; });

  // Handle the selected file — both change and input for iOS/Android compat
  function handleFile(input) {
    if (input && input.files && input.files[0]) {
      _cameraOpen = false;
      onPhotoSelected(input.files[0]);
    }
  }
  ['change','input'].forEach(function(evt) {
    capIn.addEventListener(evt, function(){ handleFile(capIn); });
    galIn.addEventListener(evt, function(){ handleFile(galIn); });
  });
}

/* ── BACK BUTTON ─────────────────────────────────────
   Android fires popstate when camera app closes.
   _cameraOpen flag blocks navigation during that window.
─────────────────────────────────────────────────────── */
history.replaceState({snap:'home'}, '');
window.addEventListener('popstate', function() {
  if (_cameraOpen) {
    // Camera/picker is returning — ignore, push state back
    _cameraOpen = false;
    history.pushState({snap:'scan'}, '');
    return;
  }
  var scanActive = g('scanScreen').classList.contains('active');
  if (scanActive) { goHome(); return; }
  history.pushState({snap:'home'}, '');
});

/* ── AUTH ────────────────────────────────────────────── */
sb.auth.onAuthStateChange(function(event, session) {

/* ── DATA ────────────────────────────────────────────── */
async function loadReceipts() {
  if (!_user) return;
  renderSkeleton();
  var res = await sb.from('receipts')
    .select('id,merchant,amount,currency,date,category,vat,notes,image_url,created_at')
    .eq('user_id', _user.id)
    .order('created_at', {ascending:false});
  if (res.error) { toast('Error loading receipts'); return; }
  _receipts = res.data || [];
  renderHome();
}

function renderHome() { updateStats(); renderList(_receipts); }

function updateStats() {
  var now = new Date();
  var taxStart = now.getMonth() >= 3
    ? new Date(now.getFullYear(),3,6)
    : new Date(now.getFullYear()-1,3,6);
  var monthRs = _receipts.filter(function(r){
    var d=new Date(r.date||r.created_at);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  var yearRs = _receipts.filter(function(r){ return new Date(r.date||r.created_at)>=taxStart; });
  g('statCount').textContent = _receipts.length;
  g('statMonth').textContent = fmt(monthRs.reduce(function(s,r){return s+parseFloat(r.amount||0);},0));
  g('statYear').textContent  = fmt(yearRs.reduce(function(s,r){return s+parseFloat(r.amount||0);},0));
  g('statVAT').textContent   = '£'+yearRs.reduce(function(s,r){return s+parseFloat(r.vat||0);},0).toFixed(2);
}

function renderSkeleton() {
  g('rlist').innerHTML = [1,2,3].map(function(){
    return '<div class="rrow" style="pointer-events:none"><div class="rrow-main">'
      +'<div class="rthumb"><div class="skel" style="width:100%;height:100%"></div></div>'
      +'<div class="rinfo"><div class="skel" style="height:14px;width:60%;margin-bottom:8px;border-radius:4px"></div>'
      +'<div class="skel" style="height:11px;width:38%;border-radius:4px"></div></div>'
      +'<div class="skel" style="height:18px;width:44px;border-radius:4px"></div>'
      +'</div></div>';
  }).join('');
}

function renderList(rs) {
  var list = g('rlist');
  if (!rs.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🧾</div>'
      +'<div class="empty-title">No receipts yet</div>'
      +'<div class="empty-sub">Tap the button below to scan your first receipt.</div></div>';
    return;
  }
  // Pre-compute month totals O(n)
  var totals = {};
  rs.forEach(function(r){
    var d=new Date(r.date||r.created_at);
    var mk=d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    totals[mk]=(totals[mk]||0)+parseFloat(r.amount||0);
  });
  var lastMk='', rows=[];
  rs.forEach(function(r,i){
    var d=new Date(r.date||r.created_at);
    var mk=d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    if(mk!==lastMk){
      rows.push('<div class="month-hdr"><span class="month-lbl">'+mk+'</span><span class="month-tot">'+fmt(totals[mk])+'</span></div>');
      lastMk=mk;
    }
    rows.push(renderRow(r,i));
  });
  list.innerHTML = rows.join('');
}

function renderRow(r, i) {
  var thumb = r.image_url
    ? '<div class="rthumb"><img src="'+esc(r.image_url)+'" alt="" loading="lazy"/></div>'
    : '<div class="rthumb">🧾</div>';
  var catBadge = r.category ? '<span class="rcat">'+esc(r.category)+'</span>' : '';
  var isExp = (_expanded === r.id);
  var noteCell = r.notes ? '<div class="dcell" style="grid-column:1/-1"><div class="dcell-lbl">Notes</div><div class="dcell-val">'+esc(r.notes)+'</div></div>' : '';
  var vatCell  = r.vat   ? '<div class="dcell"><div class="dcell-lbl">VAT</div><div class="dcell-val">'+fmt(r.vat,'GBP')+'</div></div>' : '';
  var catCell  = r.category ? '<div class="dcell"><div class="dcell-lbl">Category</div><div class="dcell-val">'+esc(r.category)+'</div></div>' : '';
  return '<div class="rrow'+(isExp?' expanded':'')+'" id="row-'+esc(r.id)+'" style="animation-delay:'+(i*0.025)+'s">'
    +'<div class="rrow-main" onclick="toggleRow(\''+esc(r.id)+'\')">'
    +thumb
    +'<div class="rinfo"><div class="rmerchant">'+esc(r.merchant||'Unknown')+'</div>'
    +'<div class="rdate">'+fmtDate(r.date||r.created_at)+'</div>'+catBadge+'</div>'
    +'<div><div class="ramount">'+fmt(r.amount,r.currency)+'</div><div class="rcurrency">'+(r.currency||'GBP')+'</div></div>'
    +'</div>'
    +'<div class="rdetail">'
    +(r.image_url?'<img class="rdetail-img" src="'+esc(r.image_url)+'" alt="Receipt"/>'  :'')
    +'<div class="dgrid">'
    +'<div class="dcell"><div class="dcell-lbl">Date</div><div class="dcell-val">'+fmtDate(r.date||r.created_at)+'</div></div>'
    +'<div class="dcell"><div class="dcell-lbl">Amount</div><div class="dcell-val">'+fmt(r.amount,r.currency)+'</div></div>'
    +catCell+vatCell+noteCell
    +'<div class="dcell"><div class="dcell-lbl">Added</div><div class="dcell-val">'+fmtDate(r.created_at)+'</div></div>'
    +'</div>'
    +'<div class="dactions">'
    +'<button class="btn-out" onclick="openEdit(\''+esc(r.id)+'\')">✏️ Edit</button>'
    +'<button class="btn-out danger" onclick="deleteReceipt(\''+esc(r.id)+'\')">Delete</button>'
    +'</div>'
    +'</div>'
    +'</div>';
}

window.toggleRow = function(id) {
  _expanded = (_expanded===id) ? null : id;
  renderList(_receipts);
  if (_expanded) setTimeout(function(){
    var row=g('row-'+id); if(row) row.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
};

window.deleteReceipt = async function(id) {
  if (!confirm('Delete this receipt?')) return;
  await sb.from('receipts').delete().eq('id',id);
  _receipts = _receipts.filter(function(r){return r.id!==id;});
  _expanded = null;
  renderHome();
  toast('Receipt deleted');
};

window.filterReceipts = function(q) {
  q = q.toLowerCase().trim();
  if (!q) { renderList(_receipts); return; }
  var filtered = _receipts.filter(function(r){
    return (r.merchant||'').toLowerCase().includes(q)
      || (r.category||'').toLowerCase().includes(q)
      || (r.notes||'').toLowerCase().includes(q)
      || (r.date||'').includes(q);
  });
  if (!filtered.length) {
    g('rlist').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>'
      +'<div class="empty-title">No results</div>'
      +'<div class="empty-sub">No receipts match "'+esc(q)+'"</div></div>';
    return;
  }
  renderList(filtered);
};

/* ── SCAN ────────────────────────────────────────────── */
window.openScan = function() {
  _imgB64 = null;
  _cameraOpen = false;
  // Reset upload zone
  g('uploadZone').style.display = 'flex';
  g('capturedStrip').classList.remove('show');

  // Reset inputs (critical for iOS re-fire)
  try { g('captureInput').value=''; } catch(e){}
  try { g('galleryInput').value=''; } catch(e){}
  // Reset OCR and fields
  g('ocrBar').classList.remove('on');
  g('cfields').classList.remove('on');
  g('cfields').style.cssText = '';
  g('saveBar').classList.remove('on');
  g('cbadge').innerHTML = '';
  g('cfMerchant').value=''; g('cfAmount').value='';
  g('cfCurrency').value='GBP'; g('cfDate').value=today();
  g('cfCategory').value=''; g('cfVat').value=''; g('cfNotes').value='';
  show('scanScreen');
  history.pushState({snap:'scan'}, '');
};

window.goHome = function() {
  show('homeScreen');
  // Reload in background — don't block UI
  setTimeout(loadReceipts, 100);
};

window.retake = function() {
  _imgB64 = null;
  _cameraOpen = false;
  g('uploadZone').style.display = 'flex';
  g('capturedStrip').classList.remove('show');
  g('capThumb').src = '';
  try { g('captureInput').value=''; } catch(e){}
  try { g('galleryInput').value=''; } catch(e){}
  g('ocrBar').classList.remove('on');
  g('cfields').classList.remove('on');
  g('cfields').style.cssText = '';
  g('saveBar').classList.remove('on');
};

/* Called by initFileInputs change/input handler */
function onPhotoSelected(file) {
  if (!file) return;

  // Show captured strip immediately
  g('uploadZone').style.display = 'none';
  g('capturedStrip').classList.add('show');
  g('capSub').textContent = 'Processing image…';
  g('ocrBar').classList.add('on');

  toJpeg(file, function(b64) {
    if (!b64 || b64.length < 200) {
      toast('Could not read image — fill in manually');
      g('capSub').textContent = 'Fill in details below';
      g('ocrBar').classList.remove('on');
      g('cbadge').innerHTML = '<div class="cbadge low">⚠ Fill in manually</div>';
      showConfirm();
      return;
    }
    _imgB64 = b64;
    g('capThumb').src = b64;
    g('capSub').textContent = 'AI is reading it…';
    runOCR(b64);
  });
}

function runOCR(b64) {
  sb.auth.getSession().then(function(res) {
    var session = res && res.data && res.data.session;
    if (!session) {
      toast('Session expired — please sign in again');
      g('ocrBar').classList.remove('on');
      showConfirm();
      return;
    }
    var raw = b64.includes(',') ? b64.split(',')[1] : b64;
    var mediaType = b64.startsWith('data:') ? (b64.match(/^data:([^;]+);/)||['','image/jpeg'])[1] : 'image/jpeg';
    // Normalise to types Anthropic accepts
    if (!['image/jpeg','image/png','image/gif','image/webp'].includes(mediaType)) mediaType = 'image/jpeg';

    fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body: JSON.stringify({imageBase64:raw, mediaType:mediaType})
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      g('cfMerchant').value = data.merchant || '';
      g('cfAmount').value   = data.amount   || '';
      g('cfDate').value     = data.date ? isoDate(data.date) : today();
      if (data.currency) g('cfCurrency').value = data.currency;
      if (data.vat)      g('cfVat').value      = data.vat;
      var conf   = (data.confidence||'medium').toLowerCase();
      var labels = {high:'✓ High confidence', medium:'~ Review fields', low:'⚠ Check fields carefully'};
      g('cbadge').innerHTML = '<div class="cbadge '+conf+'">'+(labels[conf]||conf)+'</div>';
      g('capSub').textContent = 'Review details below';
      g('ocrBar').classList.remove('on');
      showConfirm();
    })
    .catch(function(err) {
      console.error('OCR error:', err);
      g('cbadge').innerHTML = '<div class="cbadge low">⚠ Could not read — fill in manually</div>';
      g('capSub').textContent = 'Fill in details below';
      g('ocrBar').classList.remove('on');
      showConfirm();
    });
  });
}

function showConfirm() {
  g('cfields').style.cssText = 'display:flex;flex-direction:column;gap:12px;';
  g('cfields').classList.add('on');
  g('saveBar').classList.add('on');
  // Scroll fields into view
  setTimeout(function(){
    try { g('scanBody').scrollTop = g('scanBody').scrollHeight; } catch(e){}
  },50);
}

window.saveReceipt = async function() {
  var merchant = g('cfMerchant').value.trim();
  var amount   = parseFloat(g('cfAmount').value) || 0;
  var date     = g('cfDate').value;
  if (!merchant) { toast('Please enter a merchant name'); g('cfMerchant').focus(); return; }
  if (!amount)   { toast('Please enter an amount'); g('cfAmount').focus(); return; }
  var btn = g('btnSave'); btn.disabled=true; btn.textContent='Saving…';
  try {
    var imgToStore = (_imgB64 && _imgB64.length < 800000) ? _imgB64 : null;
    var res = await sb.from('receipts').insert({
      user_id:  _user.id,
      merchant: merchant,
      amount:   amount,
      currency: g('cfCurrency').value || 'GBP',
      date:     date || null,
      category: g('cfCategory').value || null,
      vat:      parseFloat(g('cfVat').value) || null,
      notes:    g('cfNotes').value.trim() || null,
      image_url:imgToStore,
      ocr_raw:  null,
    }).select().single();
    if (res.error) throw res.error;
    _receipts.unshift(res.data);
    var now = new Date();
    var monthName = now.toLocaleDateString('en-GB',{month:'long'});
    var monthTotal = _receipts.filter(function(r){
      var d=new Date(r.date||r.created_at);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    }).reduce(function(s,r){return s+parseFloat(r.amount||0);},0);
    g('succAmt').textContent      = fmt(amount);
    g('succMerchant').textContent = merchant;
    g('succSub').textContent      = monthName+' total now '+fmt(monthTotal);
    g('successOv').classList.add('on');
    setTimeout(function(){
      g('successOv').classList.remove('on');
      show('homeScreen');
      renderHome();
    }, 1800);
  } catch(e) {
    console.error(e);
    toast('Error saving — please try again');
  } finally {
    btn.disabled=false; btn.textContent='Save Receipt';
  }
};

/* ── EDIT ────────────────────────────────────────────── */
window.openEdit = function(id) {
  var r = _receipts.find(function(x){return x.id===id;});
  if (!r) return;
  _editId = id;
  g('edMerchant').value = r.merchant||'';
  g('edAmount').value   = r.amount||'';
  g('edCurrency').value = r.currency||'GBP';
  g('edDate').value     = r.date ? r.date.slice(0,10) : '';
  g('edCategory').value = r.category||'';
  g('edVat').value      = r.vat||'';
  g('edNotes').value    = r.notes||'';
  g('edMsg').className  = 'amsg';
  g('editSheet').classList.add('on');
};
window.closeEdit = function() { g('editSheet').classList.remove('on'); _editId=null; };
window.saveEdit  = async function() {
  if (!_editId) return;
  var merchant = g('edMerchant').value.trim();
  var amount   = parseFloat(g('edAmount').value) || 0;
  if (!merchant) { setMsg(g('edMsg'),'err','Please enter a merchant name.'); return; }
  if (!amount)   { setMsg(g('edMsg'),'err','Please enter an amount.'); return; }
  var btn = g('btnEditSave'); btn.disabled=true; btn.textContent='Saving…';
  var update = {
    merchant: merchant, amount: amount,
    currency: g('edCurrency').value||'GBP',
    date:     g('edDate').value||null,
    category: g('edCategory').value||null,
    vat:      parseFloat(g('edVat').value)||null,
    notes:    g('edNotes').value.trim()||null,
  };
  var res = await sb.from('receipts').update(update).eq('id',_editId);
  btn.disabled=false; btn.textContent='Save changes';
  if (res.error) { setMsg(g('edMsg'),'err','Error saving — please try again.'); return; }
  var idx = _receipts.findIndex(function(x){return x.id===_editId;});
  if (idx>-1) Object.assign(_receipts[idx], update);
  closeEdit();
  renderHome();
  toast('Receipt updated ✓');
};

/* ── EXPORT ──────────────────────────────────────────── */
window.exportCSV = function() {
  if (!_receipts.length) { toast('No receipts to export'); return; }
  var rows = _receipts.map(function(r){
    return [
      r.date||'',
      '"'+(r.merchant||'').replace(/"/g,'""')+'"',
      parseFloat(r.amount||0).toFixed(2),
      r.currency||'GBP',
      r.category||'',
      parseFloat(r.vat||0).toFixed(2),
      '"'+(r.notes||'').replace(/"/g,'""')+'"',
      new Date(r.created_at).toISOString().slice(0,10),
    ].join(',');
  });
  var csv = ['Date,Merchant,Amount (£),Currency,Category,VAT (£),Notes,Added'].concat(rows).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = 'snapreceipt-'+today()+'.csv';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
  toast('CSV exported ✓');
};

/* ── MENU ────────────────────────────────────────────── */
window.openMenu  = function() { g('menuSheet').classList.add('on'); };
window.closeMenu = function() { g('menuSheet').classList.remove('on'); };

/* ── IMAGE PROCESSING ────────────────────────────────── 
   FileReader → canvas → JPEG
   Exact pattern from weldswine — proven on all platforms
─────────────────────────────────────────────────────── */
function toJpeg(file, callback) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    var img = new Image();
    img.onload = function() {
      try {
        var MAX = 1200;
        var w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        callback(c.toDataURL('image/jpeg', 0.82));
      } catch(e) {
        callback(dataUrl); // fallback: send original
      }
    };
    img.onerror = function() { callback(dataUrl); };
    img.src = dataUrl;
  };
  reader.onerror = function() { callback(''); };
  reader.readAsDataURL(file);
}
