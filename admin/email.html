<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>SnapReceipt — Send Email</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111;--gray-7:#555;--gray-5:#888;--gray-3:#ccc;
  --gray-1:#f5f5f5;--gray-0:#fafafa;
  --blue:#0066ff;--blue-lt:#e8f0ff;
  --border:#e5e5e5;--r:10px;--r-lg:16px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
  --shadow-md:0 4px 20px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--gray-0);color:var(--black);-webkit-font-smoothing:antialiased;min-height:100dvh}
button,input,select,textarea{font-family:inherit}

/* Header */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-brand{font-size:1.05rem;font-weight:800;color:var(--black);letter-spacing:-.03em;display:flex;align-items:center;gap:8px;text-decoration:none}
.hdr-dot{width:28px;height:28px;background:var(--black);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.hdr-tag{font-size:.65rem;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.06em;background:var(--gray-1);padding:3px 7px;border-radius:6px;margin-left:4px}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-email{font-size:.78rem;color:var(--gray-5);display:none}
.hdr-signout{background:none;border:none;font-size:.78rem;font-weight:600;color:var(--blue);cursor:pointer;padding:0}

/* Shell */
.shell{max-width:560px;margin:0 auto;padding:24px 16px 80px}

/* Auth gate */
.gate{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:32px 24px;text-align:center}
.gate h2{font-size:1.1rem;font-weight:800;margin-bottom:6px}
.gate p{font-size:.85rem;color:var(--gray-5);margin-bottom:24px;line-height:1.5}

/* Shared form elements */
.fl{display:block;font-size:.72rem;font-weight:700;color:var(--gray-5);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.ti{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:#fff;color:var(--black);font-size:1rem;outline:none;transition:border-color .15s;-webkit-appearance:none}
.ti:focus{border-color:var(--blue)}
select.ti{cursor:pointer}
textarea.ti{resize:vertical;min-height:160px;line-height:1.5}
.btn-p{width:100%;padding:14px;background:var(--black);color:#fff;border:none;border-radius:var(--r);font-size:1rem;font-weight:700;letter-spacing:-.01em;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-p:active{transform:scale(.98)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.field{margin-bottom:16px;text-align:left}

/* Messages */
.msg{font-size:.85rem;padding:10px 14px;border-radius:var(--r);margin-top:12px;display:none;line-height:1.4}
.msg.ok{display:block;background:#e6f9ee;color:#1a7a3a;border:1px solid #b2e5c5}
.msg.err{display:block;background:#fde8e8;color:#c62828;border:1px solid #f5c6c6}

/* Composer card */
.composer{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow)}
.composer h1{font-size:1.2rem;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.composer .subtitle{font-size:.82rem;color:var(--gray-5);margin-bottom:24px}
.composer .shortcut{font-size:.72rem;color:var(--gray-3);text-align:center;margin-top:10px}
.composer .shortcut kbd{background:var(--gray-1);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:inherit;font-size:.7rem}

/* User list */
.user-list{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:20px 24px;box-shadow:var(--shadow);margin-bottom:20px}
.user-list h2{font-size:.95rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.user-list .subtitle{font-size:.78rem;color:var(--gray-5);margin-bottom:16px}
.user-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-1)}
.user-row:last-child{border-bottom:none}
.user-row-email{font-size:.85rem;color:var(--black);font-weight:500}
.user-row-date{font-size:.72rem;color:var(--gray-5)}
.user-row-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.75rem;font-weight:600;color:var(--blue);cursor:pointer;transition:all .15s}
.user-row-btn:hover{background:var(--blue-lt);border-color:var(--blue)}
.user-count{font-size:.72rem;color:var(--gray-5);margin-top:10px}

/* Responsive */
@media(min-width:500px){
  .hdr-email{display:block}
}
</style>
</head>
<body>

<div class="hdr">
  <a class="hdr-brand" href="/">
    <span class="hdr-dot">🧾</span>SnapReceipt<span class="hdr-tag">Admin</span>
  </a>
  <div class="hdr-right">
    <span class="hdr-email" id="hdrEmail"></span>
    <button class="hdr-signout" id="signOutBtn" style="display:none" onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="shell">

  <!-- Auth gate -->
  <div id="gate" class="gate" style="display:none">
    <h2>Admin access</h2>
    <p>Sign in with your admin email to send messages from <strong>@snapreceipt.co.uk</strong>.</p>
    <div class="field">
      <label class="fl" for="gateEmail">Email</label>
      <input class="ti" id="gateEmail" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label class="fl" for="gatePass">Password</label>
      <input class="ti" id="gatePass" type="password" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn-p" id="gateBtn" onclick="doSignIn()">Sign in</button>
    <div class="msg" id="gateMsg"></div>
  </div>

  <!-- Main app -->
  <div id="app" style="display:none">

    <!-- User list -->
    <div class="user-list" id="userListCard">
      <h2>Registered users</h2>
      <p class="subtitle">Tap a user to pre-fill the To field below.</p>
      <div id="userListBody" style="font-size:.82rem;color:var(--gray-5)">Loading…</div>
      <div class="user-count" id="userCount"></div>
    </div>

    <!-- Composer -->
    <div class="composer">
      <h1>Compose</h1>
      <p class="subtitle">Send an email from <strong>@snapreceipt.co.uk</strong> via Resend.</p>

      <div class="field">
        <label class="fl" for="fromSelect">From</label>
        <select class="ti" id="fromSelect">
          <option value="hello@snapreceipt.co.uk">hello@snapreceipt.co.uk</option>
          <option value="support@snapreceipt.co.uk">support@snapreceipt.co.uk</option>
          <option value="noreply@snapreceipt.co.uk">noreply@snapreceipt.co.uk</option>
        </select>
      </div>
      <div class="field">
        <label class="fl" for="toInput">To</label>
        <input class="ti" id="toInput" type="email" placeholder="recipient@example.com" required>
      </div>
      <div class="field">
        <label class="fl" for="subjectInput">Subject</label>
        <input class="ti" id="subjectInput" type="text" placeholder="What's this about?">
      </div>
      <div class="field">
        <label class="fl" for="bodyInput">Message</label>
        <textarea class="ti" id="bodyInput" placeholder="Write your message here…"></textarea>
      </div>

      <button class="btn-p" id="sendBtn" onclick="doSend()">Send email</button>
      <p class="shortcut"><kbd>⌘</kbd> + <kbd>Enter</kbd> to send</p>
      <div class="msg" id="sendMsg"></div>
    </div>
  </div>

</div>

<script>
/* ── Config ────────────────────────────────────────────── */
const SUPABASE_URL = 'https://swkaswlzzqzjiuujyupg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6aS3MglXaAtUsFnbIUTpWg_Omj9nWOe';
const WORKER_URL   = 'https://snapreceipt-ocr.james-weld.workers.dev';

// Client-side admin whitelist (UX only — real check is in the worker)
const ADMIN_EMAILS = ['james_weld@yahoo.com'];

let sb = null;
let _session = null;

/* ── Bootstrap ─────────────────────────────────────────── */
(async function init() {
  // Load Supabase client
  const mod = document.createElement('script');
  mod.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  mod.onload = async function() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data } = await sb.auth.getSession();
    if (data.session && isAdmin(data.session.user.email)) {
      _session = data.session;
      showApp();
    } else {
      document.getElementById('gate').style.display = '';
    }
  };
  document.head.appendChild(mod);
})();

function isAdmin(email) {
  return ADMIN_EMAILS.includes((email || '').toLowerCase());
}

/* ── Auth ──────────────────────────────────────────────── */
async function doSignIn() {
  var email = document.getElementById('gateEmail').value.trim();
  var pass  = document.getElementById('gatePass').value.trim();
  var msg   = document.getElementById('gateMsg');
  msg.className = 'msg'; msg.textContent = '';

  if (!email || !pass) { showMsg(msg, 'err', 'Please fill in both fields.'); return; }
  if (!isAdmin(email)) { showMsg(msg, 'err', 'Not an admin email.'); return; }

  var btn = document.getElementById('gateBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  var { data, error } = await sb.auth.signInWithPassword({ email: email, password: pass });
  btn.disabled = false; btn.textContent = 'Sign in';

  if (error) { showMsg(msg, 'err', error.message); return; }
  _session = data.session;
  showApp();
}

async function signOut() {
  await sb.auth.signOut();
  _session = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('signOutBtn').style.display = 'none';
  document.getElementById('hdrEmail').textContent = '';
  document.getElementById('gate').style.display = '';
}

/* ── App ───────────────────────────────────────────────── */
function showApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('signOutBtn').style.display = '';
  document.getElementById('hdrEmail').textContent = _session.user.email;
  loadUsers();
}

/* ── User list ─────────────────────────────────────────── */
async function loadUsers() {
  var body = document.getElementById('userListBody');
  var count = document.getElementById('userCount');
  try {
    var res = await fetch(WORKER_URL + '/list-users', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + _session.access_token
      }
    });
    if (!res.ok) { body.textContent = 'Failed to load users.'; return; }
    var data = await res.json();
    var users = data.users || [];
    if (!users.length) { body.textContent = 'No users yet.'; return; }

    body.innerHTML = '';
    users.forEach(function(u) {
      var row = document.createElement('div');
      row.className = 'user-row';
      var dateStr = u.created_at ? new Date(u.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '';
      row.innerHTML = '<div><div class="user-row-email">' + esc(u.email) + '</div><div class="user-row-date">' + dateStr + '</div></div>' +
        '<button class="user-row-btn" onclick="pickUser(\'' + esc(u.email) + '\')">Email</button>';
      body.appendChild(row);
    });
    count.textContent = users.length + ' user' + (users.length === 1 ? '' : 's');
  } catch(e) {
    body.textContent = 'Error loading users.';
  }
}

function pickUser(email) {
  document.getElementById('toInput').value = email;
  document.getElementById('subjectInput').focus();
}

/* ── Send email ────────────────────────────────────────── */
async function doSend() {
  var from    = document.getElementById('fromSelect').value;
  var to      = document.getElementById('toInput').value.trim();
  var subject = document.getElementById('subjectInput').value.trim();
  var body    = document.getElementById('bodyInput').value.trim();
  var msg     = document.getElementById('sendMsg');
  msg.className = 'msg'; msg.textContent = '';

  if (!to)      { showMsg(msg, 'err', 'Please enter a recipient.'); return; }
  if (!subject) { showMsg(msg, 'err', 'Please enter a subject.'); return; }
  if (!body)    { showMsg(msg, 'err', 'Please write a message.'); return; }

  var btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Sending…';

  try {
    // Refresh session token if needed
    var { data: sessData } = await sb.auth.getSession();
    var token = sessData?.session?.access_token || _session.access_token;

    var res = await fetch(WORKER_URL + '/send-email', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ from: from, to: to, subject: subject, body: body })
    });

    var result = await res.json();
    btn.disabled = false; btn.textContent = 'Send email';

    if (res.ok) {
      showMsg(msg, 'ok', 'Email sent to ' + to + '!');
      document.getElementById('toInput').value = '';
      document.getElementById('subjectInput').value = '';
      document.getElementById('bodyInput').value = '';
    } else {
      showMsg(msg, 'err', result.error || 'Failed to send.');
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Send email';
    showMsg(msg, 'err', 'Network error — check your connection.');
  }
}

/* ── Keyboard shortcut ─────────────────────────────────── */
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    if (document.getElementById('app').style.display !== 'none') {
      e.preventDefault();
      doSend();
    }
  }
});

/* ── Helpers ───────────────────────────────────────────── */
function showMsg(el, type, text) {
  el.className = 'msg ' + type;
  el.textContent = text;
}
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
